get:
  operationId: findTaxBrackets
  tags: [ tax-bracket-fetcher ]
  summary: Search tax brackets
  description: >
    Retrieve tax brackets filtered by optional name.
    Returns a list of matching tax brackets for the current user.
  parameters:
    - $ref: '#/components/parameters/name-filter'
  responses:
    "200":
      description: The tax brackets matching the filters
      content:
        application/json:
          schema:
            type: array
            items: { $ref: '#/components/schemas/tax-bracket-response' }
    "401": { $ref: '#/components/responses/401' }
    "403": { $ref: '#/components/responses/403' }
post:
  operationId: createTaxBracket
  tags: [ tax-bracket-command ]
  summary: Create tax bracket
  description: Create a new tax bracket in the application.
  requestBody:
    content:
      application/json:
        schema: { $ref: '#/components/schemas/tax-bracket-request' }
  responses:
    "201":
      description: The created tax bracket
      content:
        application/json:
          schema: { $ref: '#/components/schemas/tax-bracket-response' }
    "400": { $ref: '#/components/responses/400' }
    "401": { $ref: '#/components/responses/401' }
    "403": { $ref: '#/components/responses/403' }
