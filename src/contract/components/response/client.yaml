type: object
required:
  - id
  - name
properties:
  id:
    type: integer
    description: The identifier of the client
    format: int64
  name:
    type: string
    description: The name of the client
    example: Acme Corporation
  email:
    type: string
    description: The email address of the client
    format: email
    example: contact@acme.com
  phone:
    type: string
    description: The phone number of the client
    example: "+1-555-1234"
  address:
    type: string
    description: The physical address of the client
    example: 123 Main St, Springfield
  archived:
    type: boolean
    description: Indicator if the client is archived
